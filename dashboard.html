<!DOCTYPE html>

<html class="dark" lang="es"><head>

<style>
        .sofia-pulse {
            position: relative;
        }
        .sofia-pulse::before, .sofia-pulse::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #aaa4ff;
            opacity: 0.2;
            z-index: -1;
        }
        .sofia-speech-bubble {
            border-bottom-left-radius: 0 !important;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#020d27] flex items-center justify-between px-6 h-16 shadow-none">
<div class="text-xl font-extrabold text-[#aaa4ff] font-['Plus_Jakarta_Sans'] tracking-tight">APPE</div>
<div class="flex items-center gap-4">
<span class="text-on-surface-variant font-medium text-sm">10:45 AM</span>
<button class="text-[#aaa4ff] hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined">menu</span>
</button>
</div>
</header>
<main class="pt-24 px-6 max-w-2xl mx-auto space-y-12">
<!-- Sofia Assistant Section -->
<section class="flex flex-col items-start gap-6">
<!-- Speech Bubble -->
<div class="sofia-speech-bubble bg-[#534ab7]/20 border border-[#534ab7]/40 p-5 rounded-xl text-on-surface max-w-[85%] relative shadow-lg backdrop-blur-md">
<p class="text-base leading-relaxed font-medium">¡Hola! Soy Sofía, tu asistente escolar. ¿En qué te ayudo hoy?</p>
</div>
<!-- Avatar & Label -->
<div class="flex items-center gap-4">
<div class="sofia-pulse w-[90px] h-[90px] rounded-full bg-[#534AB7] border-2 border-[#7F77DD] flex items-center justify-center overflow-hidden shadow-[0_0_20px_rgba(170,164,255,0.3)]">
<img class="w-full h-full object-cover" data-alt="stylized female student silhouette in a Colombian school uniform, minimalist vector style on a vibrant purple background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDY2y2D_yhwCBoUzxvlcd06dNh7wnPHKxkfBeJOZCj9Mujue18_HwxlOM8h3JXmrnM7xvL6F3-W771dHPyLws2Wtp_9h3W_CZFxUcV527ayjRiyMQhWT5x0H7AMnhMVgVO3bttOKlSDYnfWc2dQhtC7IYCec4QZHQ1sB-1cRiulhe88DAtS-YFGqQS29phTpQz3TzqTejqVkoBVyRH98MDzMSXRj3R4eVybdZyU6fxYqRva2KsZGmC70sUEgDJcSn_VYeBTcmiOmSZi"/>
</div>
<div class="flex flex-col">
<span class="text-white text-sm font-semibold tracking-wide">Sofía</span>
<span class="text-white/60 text-xs font-medium">tu asistente</span>
</div>
</div>
</section>
<!-- Functions Grid -->
<section class="grid grid-cols-2 gap-4">
<!-- Mi horario -->
<button class="group flex flex-col items-start p-5 h-40 bg-[#1E3A6E] border border-[#378ADD]/40 rounded-xl hover:scale-[1.02] active:scale-95 transition-all text-left relative overflow-hidden">
<div class="absolute top-0 right-0 p-4 opacity-20 group-hover:opacity-40 transition-opacity">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">calendar_today</span>
</div>
<div class="mt-auto">
<span class="material-symbols-outlined text-[#378ADD] mb-3" style="font-variation-settings: 'FILL' 1;">schedule</span>
<h3 class="text-white font-bold text-lg leading-tight">Mi horario</h3>
</div>
</button>
<!-- Menú de hoy -->
<button class="group flex flex-col items-start p-5 h-40 bg-[#1A4A3A] border border-[#1D9E75]/40 rounded-xl hover:scale-[1.02] active:scale-95 transition-all text-left relative overflow-hidden">
<div class="absolute top-0 right-0 p-4 opacity-20 group-hover:opacity-40 transition-opacity">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">restaurant</span>
</div>
<div class="mt-auto">
<span class="material-symbols-outlined text-[#1D9E75] mb-3" style="font-variation-settings: 'FILL' 1;">nutrition</span>
<h3 class="text-white font-bold text-lg leading-tight">Menú de hoy</h3>
</div>
</button>
<!-- Mis evaluaciones -->
<button class="group flex flex-col items-start p-5 h-40 bg-[#4A1A4A] border border-[#D4537E]/40 rounded-xl hover:scale-[1.02] active:scale-95 transition-all text-left relative overflow-hidden">
<div class="absolute top-0 right-0 p-4 opacity-20 group-hover:opacity-40 transition-opacity">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">assignment_turned_in</span>
</div>
<div class="mt-auto">
<span class="material-symbols-outlined text-[#D4537E] mb-3" style="font-variation-settings: 'FILL' 1;">grade</span>
<h3 class="text-white font-bold text-lg leading-tight">Mis actividades</h3>
</div>
</button>
<!-- Mi colegio -->
<button class="group flex flex-col items-start p-5 h-40 bg-[#4A3A0A] border border-[#EF9F27]/40 rounded-xl hover:scale-[1.02] active:scale-95 transition-all text-left relative overflow-hidden">
<div class="absolute top-0 right-0 p-4 opacity-20 group-hover:opacity-40 transition-opacity">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">school</span>
</div>
<div class="mt-auto">
<span class="material-symbols-outlined text-[#EF9F27] mb-3" style="font-variation-settings: 'FILL' 1;">domain</span>
<h3 class="text-white font-bold text-lg leading-tight">Mi colegio</h3>
</div>
</button>
<!-- Mis redes sociales -->
<button class="group flex flex-col items-start p-5 h-40 bg-[#2A1A4A] border border-[#7F77DD]/40 rounded-xl hover:scale-[1.02] active:scale-95 transition-all text-left relative overflow-hidden">
<div class="absolute top-0 right-0 p-4 opacity-20 group-hover:opacity-40 transition-opacity">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">public</span>
</div>
<div class="mt-auto">
<span class="material-symbols-outlined text-[#7F77DD] mb-3" style="font-variation-settings: 'FILL' 1;">share</span>
<h3 class="text-white font-bold text-lg leading-tight">Mis redes sociales</h3>
</div>
</button></section>
<!-- Recent Activity (Bento Grid Style) -->
<section class="space-y-4">
<h2 class="text-primary font-headline font-bold text-xl tracking-tight">Próxima Clase</h2>
<div class="bg-surface-container-high rounded-xl p-6 flex items-center justify-between border-l-4 border-secondary shadow-lg">
<div class="flex gap-4 items-center">
<div class="w-12 h-12 rounded-full bg-secondary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">functions</span>
</div>
<div>
<p class="text-on-surface font-bold text-lg">Matemáticas Avanzadas</p>
<p class="text-on-surface-variant text-sm">Salón 302 • 11:00 AM</p>
</div>
</div>
<span class="material-symbols-outlined text-outline">chevron_right</span>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-6 left-4 right-4 rounded-full overflow-hidden bg-[#020d27]/80 backdrop-blur-xl flex justify-around items-center h-20 px-4 w-auto z-50 shadow-[0_20px_40px_rgba(0,0,0,0.4)]">
<!-- Inicio (Active) -->
<a class="flex flex-col items-center justify-center text-[#aaa4ff] after:content-[''] after:w-1 after:h-1 after:bg-[#aaa4ff] after:rounded-full after:mt-1 hover:text-white/60 transition-colors active:scale-90 duration-300" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="font-['Be_Vietnam_Pro'] text-[10px] font-medium">Inicio</span>
</a>
<!-- Menú -->
<a class="flex flex-col items-center justify-center text-white/35 hover:text-white/60 transition-colors active:scale-90 duration-300" href="#">
<span class="material-symbols-outlined">grid_view</span>
<span class="font-['Be_Vietnam_Pro'] text-[10px] font-medium">Menú</span>
</a>
<!-- Horario -->
<a class="flex flex-col items-center justify-center text-white/35 hover:text-white/60 transition-colors active:scale-90 duration-300" href="#">
<span class="material-symbols-outlined">calendar_today</span>
<span class="font-['Be_Vietnam_Pro'] text-[10px] font-medium">Horario</span>
</a>
<!-- Plataformas -->
<a class="flex flex-col items-center justify-center text-white/35 hover:text-white/60 transition-colors active:scale-90 duration-300" href="#">
<span class="material-symbols-outlined">layers</span>
<span class="font-['Be_Vietnam_Pro'] text-[10px] font-medium">Plataformas</span>
</a>
<!-- Nutrición -->
<a class="flex flex-col items-center justify-center text-white/35 hover:text-white/60 transition-colors active:scale-90 duration-300" href="#">
<span class="material-symbols-outlined">restaurant</span>
<span class="font-['Be_Vietnam_Pro'] text-[10px] font-medium">Nutrición</span>
</a>
</nav>
<!-- Sofia Floating Action (Contextual Ask) -->
<div class="fixed bottom-28 right-6">
<button class="bg-gradient-to-br from-primary to-primary-container text-on-primary-container px-6 py-3 rounded-full flex items-center gap-2 font-bold shadow-[0_0_15px_rgba(170,164,255,0.3)] hover:scale-105 active:scale-95 transition-transform">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">bolt</span>
<span>Preguntar a Sofía</span>
</button>
</div>
</body></html>
