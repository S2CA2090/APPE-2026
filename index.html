<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APPE — Asistente Personal Para Estudiantes</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito', sans-serif;
      background: #0D1117;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Contenedor tipo celular */
    .phone {
      width: 375px;
      height: 812px;
      background: #0D1117;
      border-radius: 40px;
      overflow: hidden;
      position: relative;
      border: 2px solid #1E3060;
      box-shadow: 0 0 60px rgba(83,74,183,0.3);
    }

    /* Fondo con siluetas */
    .bg-scene {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    /* Partículas de fondo */
    .particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(83,74,183,0.15);
      animation: float 6s ease-in-out infinite;
    }
    .particle:nth-child(1) { width:80px; height:80px; top:10%; left:5%; animation-delay:0s; }
    .particle:nth-child(2) { width:50px; height:50px; top:20%; right:8%; animation-delay:1s; }
    .particle:nth-child(3) { width:120px; height:120px; top:50%; left:-20px; animation-delay:2s; }
    .particle:nth-child(4) { width:60px; height:60px; bottom:20%; right:10%; animation-delay:0.5s; }
    .particle:nth-child(5) { width:40px; height:40px; bottom:35%; left:15%; animation-delay:1.5s; }

    @keyframes float {
      0%,100% { transform: translateY(0) scale(1); opacity:0.3; }
      50% { transform: translateY(-20px) scale(1.05); opacity:0.6; }
    }

    /* Contenido principal */
    .content {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 50px 24px 40px;
    }

    /* Logo APPE */
    .logo-section {
      text-align: center;
      animation: fadeDown 0.6s ease forwards;
      opacity: 0;
    }
    @keyframes fadeDown {
      from { opacity:0; transform:translateY(-20px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .logo-icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #534AB7, #7F77DD);
      border-radius: 20px;
      margin: 0 auto 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px rgba(83,74,183,0.4);
    }

    .logo-title {
      font-size: 36px;
      font-weight: 800;
      color: #FFFFFF;
      letter-spacing: 6px;
      text-shadow: 0 0 30px rgba(83,74,183,0.5);
    }

    .logo-sub {
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 6px;
    }

    /* Ilustración central */
    .illustration {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      animation: fadeUp 0.8s ease 0.2s forwards;
      opacity: 0;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(30px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .scene-svg {
      width: 100%;
      max-width: 320px;
    }

    /* Texto motivacional */
    .tagline {
      text-align: center;
      margin-bottom: 28px;
      animation: fadeUp 0.8s ease 0.3s forwards;
      opacity: 0;
    }

    .tagline h2 {
      font-size: 22px;
      font-weight: 700;
      color: #FFFFFF;
      line-height: 1.3;
      margin-bottom: 8px;
    }

    .tagline p {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      line-height: 1.5;
    }

    /* Botón principal */
    .btn-wrap {
      width: 100%;
      animation: popIn 0.4s ease 0.6s forwards;
      opacity: 0;
      transform: scale(0.8);
    }
    @keyframes popIn {
      from { opacity:0; transform:scale(0.8); }
      to   { opacity:1; transform:scale(1); }
    }

    .btn-main {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #534AB7, #7F77DD);
      border: none;
      border-radius: 28px;
      color: #FFFFFF;
      font-size: 17px;
      font-weight: 700;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      letter-spacing: 0.5px;
      box-shadow: 0 8px 32px rgba(83,74,183,0.45);
      animation: pulse 2s ease-in-out infinite;
      transition: transform 0.15s, box-shadow 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-main:active {
      transform: scale(0.97);
      box-shadow: 0 4px 16px rgba(83,74,183,0.3);
    }

    @keyframes pulse {
      0%,100% { box-shadow: 0 8px 32px rgba(83,74,183,0.45); }
      50%      { box-shadow: 0 8px 48px rgba(83,74,183,0.7); }
    }

    /* Chips de info */
    .chips {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      justify-content: center;
      animation: fadeUp 0.6s ease 0.4s forwards;
      opacity: 0;
    }

    .chip {
      background: rgba(83,74,183,0.2);
      border: 1px solid rgba(83,74,183,0.35);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 11px;
      color: rgba(255,255,255,0.6);
    }

    /* Crédito */
    .credit {
      margin-top: 16px;
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      text-align: center;
      letter-spacing: 0.3px;
    }

    /* Pantalla de transición */
    .transition-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #0F1B35;
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .transition-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .loading-dots {
      display: flex;
      gap: 8px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #534AB7;
      animation: dotPulse 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dotPulse {
      0%,100% { transform: scale(1); opacity: 0.5; }
      50%      { transform: scale(1.4); opacity: 1; }
    }
  </style>
</head>
<body>

<div class="transition-overlay" id="overlay">
  <div class="loading-dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</div>

<div class="phone">

  <!-- Partículas de fondo -->
  <div class="bg-scene">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <div class="content">

    <!-- Logo -->
    <div class="logo-section">
      <div class="logo-icon">
        <svg width="38" height="38" viewBox="0 0 38 38" fill="none">
          <path d="M19 6L8 12v14l11 6 11-6V12L19 6z" stroke="white" stroke-width="2" stroke-linejoin="round"/>
          <path d="M19 6v20M8 12l11 6 11-6" stroke="white" stroke-width="2" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="logo-title">APPE</div>
      <div class="logo-sub">Asistente Personal Para Estudiantes</div>
    </div>

    <!-- Ilustración SVG -->
    <div class="illustration">
      <svg class="scene-svg" viewBox="0 0 320 260" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="320" height="260" fill="#0D1117"/>
        <circle cx="270" cy="45" r="35" fill="rgba(83,74,183,0.12)" stroke="rgba(83,74,183,0.25)" stroke-width="1"/>
        <circle cx="270" cy="45" r="22" fill="rgba(83,74,183,0.18)"/>
        <circle cx="40" cy="30" r="1.5" fill="rgba(255,255,255,0.4)"/>
        <circle cx="80" cy="15" r="1" fill="rgba(255,255,255,0.3)"/>
        <circle cx="150" cy="20" r="1.5" fill="rgba(255,255,255,0.35)"/>
        <circle cx="220" cy="10" r="1" fill="rgba(255,255,255,0.25)"/>
        <circle cx="60" cy="55" r="1" fill="rgba(255,255,255,0.2)"/>
        <circle cx="300" cy="80" r="1.5" fill="rgba(255,255,255,0.3)"/>
        <ellipse cx="160" cy="230" rx="150" ry="25" fill="rgba(30,48,96,0.5)"/>

        <!-- Estudiante 1 -->
        <g transform="translate(50, 130)">
          <ellipse cx="30" cy="90" rx="22" ry="8" fill="rgba(30,48,96,0.6)"/>
          <rect x="18" y="50" width="24" height="38" rx="8" fill="#2A4080"/>
          <circle cx="30" cy="42" r="16" fill="#2A4080"/>
          <rect x="8" y="62" width="28" height="18" rx="3" fill="#534AB7" opacity="0.8"/>
          <line x1="22" y1="62" x2="22" y2="80" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
          <path d="M18 65 Q10 70 12 75" stroke="#2A4080" stroke-width="5" stroke-linecap="round"/>
        </g>

        <!-- Estudiante 2 -->
        <g transform="translate(130, 90)">
          <ellipse cx="30" cy="145" rx="18" ry="6" fill="rgba(30,48,96,0.5)"/>
          <rect x="20" y="105" width="10" height="38" rx="5" fill="#162040"/>
          <rect x="32" y="105" width="10" height="38" rx="5" fill="#162040"/>
          <rect x="16" y="55" width="28" height="52" rx="10" fill="#534AB7"/>
          <rect x="6" y="60" width="14" height="28" rx="6" fill="#7F77DD"/>
          <circle cx="30" cy="42" r="18" fill="#534AB7"/>
          <circle cx="25" cy="40" r="2" fill="rgba(255,255,255,0.5)"/>
          <circle cx="35" cy="40" r="2" fill="rgba(255,255,255,0.5)"/>
          <path d="M24 48 Q30 54 36 48" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          <path d="M44 70 Q55 55 52 48" stroke="#534AB7" stroke-width="6" stroke-linecap="round"/>
          <rect x="48" y="36" width="14" height="18" rx="3" fill="#7F77DD"/>
          <rect x="50" y="38" width="10" height="14" rx="2" fill="#0F1B35"/>
          <rect x="51" y="39" width="8" height="11" rx="1" fill="rgba(83,74,183,0.6)"/>
        </g>

        <!-- Estudiante 3 -->
        <g transform="translate(218, 115)">
          <ellipse cx="28" cy="125" rx="16" ry="5" fill="rgba(30,48,96,0.4)"/>
          <path d="M20 95 Q12 110 10 120" stroke="#162040" stroke-width="8" stroke-linecap="round"/>
          <path d="M36 95 Q44 110 46 120" stroke="#162040" stroke-width="8" stroke-linecap="round"/>
          <rect x="14" y="48" width="28" height="50" rx="10" fill="#1D9E75"/>
          <circle cx="28" cy="36" r="16" fill="#1D9E75"/>
          <circle cx="23" cy="33" r="2" fill="rgba(255,255,255,0.6)"/>
          <circle cx="33" cy="33" r="2" fill="rgba(255,255,255,0.6)"/>
          <path d="M22 41 Q28 47 34 41" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          <path d="M14 65 Q2 58 0 50" stroke="#1D9E75" stroke-width="6" stroke-linecap="round"/>
          <path d="M42 65 Q54 58 56 50" stroke="#1D9E75" stroke-width="6" stroke-linecap="round"/>
        </g>

        <text x="160" y="250" text-anchor="middle" font-family="Nunito, sans-serif" font-size="11" fill="rgba(83,74,183,0.5)" letter-spacing="3">SANTIAGO DE CALI · 2026</text>
      </svg>
    </div>

    <!-- Tagline -->
    <div class="tagline">
      <h2>Tu colegio en la palma<br>de tu mano</h2>
      <p>Horarios · Menú PAE · Evaluaciones · Plataformas</p>
    </div>

    <!-- Chips -->
    <div class="chips">
      <span class="chip">Sin registro</span>
      <span class="chip">Sin contraseña</span>
      <span class="chip">PAE Cali 2026</span>
    </div>

    <!-- Botón principal -->
    <div class="btn-wrap">
      <button class="btn-main" onclick="ingresar()">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M10 2L18 10L10 18M2 10h16" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Ingresar al APPE
      </button>
    </div>

    <!-- Crédito -->
    <div class="credit">Construida por: Alexander Correa Daraviña</div>

  </div>
</div>

<script>
  function ingresar() {
    const overlay = document.getElementById('overlay');
    overlay.classList.add('active');
    setTimeout(() => {
      window.location.href = 'pagina2.html';
    }, 1500);
  }
</script>

</body>
</html>
