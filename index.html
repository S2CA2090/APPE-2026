<body class="font-body text-on-background min-h-screen flex flex-col items-center justify-between overflow-hidden selection:bg-primary/30">
<!-- Top AppBar (Identity Anchor) -->
<header class="fixed top-0 w-full z-50 flex items-center justify-center px-6 h-24">
<div class="flex flex-col items-center gap-1">
<h1 class="font-headline text-4xl font-extrabold text-white tracking-tighter">
                APPE
            </h1>
<p class="font-body text-[10px] uppercase tracking-[0.3em] text-white/50 font-medium">
                Asistente Personal Para Estudiantes
            </p>
</div>
</header>
<!-- Cinematic Canvas Area -->
<main class="relative w-full flex-grow flex items-center justify-center mt-20 mb-32">
<div class="absolute inset-0 cinematic-glow pointer-events-none"></div>
<!-- Illustration Container -->
<div class="relative w-full max-w-2xl px-4 flex flex-col items-center">
<div class="relative w-full aspect-[4/3] rounded-xl overflow-hidden shadow-2xl">
<!-- Vector-style Illustration Background -->
<div class="absolute inset-0 bg-gradient-to-b from-[#0d1117] via-[#1e3060] to-[#2a4080] opacity-40"></div>
<!-- Full-bleed Cinematic Illustration -->
<img alt="Cinematic night illustration" class="w-full h-full object-cover mix-blend-lighten" data-alt="Cinematic vector illustration of student silhouettes jumping and reading under a deep blue night sky with soft moonlight and purple glow" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBDk47SkFtVR0n3-q0pzL8OMroD7pOTw19sczBFU3qJUIC7yaMXQLLvZ_6G9KgXF9G4fJJT0thQUz5zPB6Cp8Jdm4WagdeDiRHoMnZ65wdqOl3frZjUlyJISgH1FBSIjiAMxFnd931MMRuPD-9FlsVmagQ1_lnTrh535l4xeeLefh68y6l7_FB1Yd45kJVtQHC71PIYTKNalLogCcdlLpMpqhf-f3gRmTycUuRCcRmh7ytubPeDmBFl6MrZL0fxHSf-uj0XGJMGyyXr"/>
<!-- Layered depth elements (Sofía's Glow) -->
<div class="absolute bottom-0 left-0 right-0 h-1/2 bg-gradient-to-t from-background to-transparent"></div>
</div>
<!-- Decorative Elements -->
<div class="absolute -z-10 w-64 h-64 bg-primary/10 blur-[100px] rounded-full top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"></div>
</div>
</main>
<!-- Interaction & Footer Area -->
<section class="fixed bottom-0 w-full pb-10 flex flex-col items-center gap-8 bg-gradient-to-t from-background via-background/90 to-transparent">
<!-- Primary Action (The Capsule) -->
<button onclick="window.location.href='dashboard.html'" class="w-[85%] max-w-md h-[52px] bg-[#534AB7] rounded-full flex items-center justify-center gap-3 shadow-[0_0_20px_rgba(83,74,183,0.4)] hover:shadow-[0_0_30px_rgba(170,164,255,0.6)] active:scale-95 transition-all group">
  <span class="relative z-10 font-headline font-bold text-white tracking-wide">
    Ingresar al APPE
  </span>
  <span class="material-symbols-outlined text-white relative z-10 text-xl group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
  <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-1000"></div>
</button>
<!-- Signature Footer -->
<footer class="flex flex-col items-center gap-1 opacity-30">
<span class="text-[10px] font-medium tracking-widest text-white uppercase">
                Construida por: Alexander Correa Daraviña
            </span>
<div class="w-8 h-[1px] bg-white/50 rounded-full"></div>
</footer>
</section>
<!-- Ambient background light effect (Sofía's Pulse influence) -->
<div class="fixed top-1/2 -left-32 w-96 h-96 bg-primary/5 blur-[120px] rounded-full pointer-events-none"></div>
<div class="fixed bottom-1/4 -right-32 w-96 h-96 bg-secondary/5 blur-[120px] rounded-full pointer-events-none"></div>
